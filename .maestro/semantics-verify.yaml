appId: com.moustra.app
---
# Semantics Label Verification Test
# Verifies Maestro can find Flutter elements by Semantics labels

# 0. Launch app (don't clear state — flutter run install has proper keychain)
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 01-login-screen

# 1. Login using Semantics labels
- tapOn:
    text: "Email"
- inputText: "admin+29917@moustra.com"
- takeScreenshot: 02-email-entered

# 2. Tap on title to dismiss keyboard, then tap password
- tapOn:
    text: "Welcome to Moustra"
    optional: true
- tapOn:
    text: "Password"
- inputText: "admin+29917"
- takeScreenshot: 03-password-entered

# 3. Tap on title to dismiss keyboard, then tap Sign In
- tapOn:
    text: "Welcome to Moustra"
    optional: true
- tapOn:
    text: "Sign In"
- takeScreenshot: 04-sign-in-tapped

# 4. Wait for login to process
- extendedWaitUntil:
    visible: ".*"
    timeout: 25000
- waitForAnimationToEnd:
    timeout: 10000

# 4a. Dismiss iOS "Save Password?" dialog — tap Save Password (Not Now cancels auth)
- tapOn:
    text: "Save Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 05-post-login

# 5. Try opening drawer by Semantics label
- tapOn:
    text: "Open menu"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 06-open-menu-attempt

# 6. Fallback: swipe to open drawer
- swipe:
    start: "2%, 50%"
    end: "80%, 50%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 07-drawer-open

# 7. Tap Animal by label
- tapOn:
    text: "Animal"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 08-animals

# 8. Drawer > Cages
