appId: com.moustra.app
---
# Post-Login Semantics Test
# App should already be logged in from flutter run

# 1. Take screenshot of current state
- takeScreenshot: 01-current-state

# 2. Wait for content to load
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: 02-loaded

# 3. Try Open menu by Semantics label
- tapOn:
    text: "Open menu"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 03-open-menu-attempt

# 4. Fallback swipe to open drawer
- swipe:
    start: "2%, 50%"
    end: "80%, 50%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 04-drawer

# 5. Test drawer items by label
- tapOn:
    text: "Animal"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 05-animals

# 6. Drawer > Cages
- swipe:
    start: "2%, 50%"
    end: "80%, 50%"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Cages"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 06-cages

# 7. Drawer > Strain
- swipe:
    start: "2%, 50%"
    end: "80%, 50%"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Strain"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 07-strains

# 8. Drawer > Settings
- swipe:
    start: "2%, 50%"
    end: "80%, 50%"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Settings"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 08-settings

- takeScreenshot: 09-final
