appId: com.moustra.app
---
# Litter CRUD — Full Create + Edit + Verify
# Edit: pressKey: Enter triggers onFieldSubmitted → _saveLitter()

- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Email"
- inputText: "admin+29917@moustra.com"
- tapOn:
    text: "Password"
- inputText: "admin+29917"
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: ".*"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Litter"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: litter-01-list

# CREATE
- tapOn:
    text: "Open actions menu"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Create Litter"
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Litter Tag"
- inputText: "QA-LITTER-CRUD"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000

- scrollUntilVisible:
    element:
      text: "Create Litter"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Create Litter"
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: litter-02-after-create
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: litter-03-list

# EDIT
- tapOn:
    text: "QA-LITTER-CRUD"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: litter-04-edit-form

- tapOn:
    text: "Litter Tag"
    optional: true
- eraseText: 25
- inputText: "QA-LITTER-UPDATED"
# Enter triggers _saveLitter()
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: litter-05-after-edit
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: litter-06-verify
- takeScreenshot: litter-07-final
