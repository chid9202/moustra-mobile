appId: com.moustra.app
---
# Semantics Label Verification Test
# Tests that Maestro can find elements by text/label after Semantics additions

# 0. Launch app
- launchApp

# 1. Login screen — test label-based tapping
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 01-login-screen

# 2. Tap Email field by label
- tapOn:
    text: "Email"
- inputText: "admin+29917@moustra.com"
- takeScreenshot: 02-email-entered

# 3. Tap Password field by label
- tapOn:
    text: "Password"
- inputText: "admin+29917"
- takeScreenshot: 03-password-entered

# 4. Tap Sign In button by label
- tapOn:
    text: "Sign In"
- takeScreenshot: 04-sign-in-tapped

# 5. Wait for home screen
- extendedWaitUntil:
    visible: ".*"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: 05-home-loaded

# 6. Open drawer via hamburger menu label
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 06-drawer-open

# 7. Tap Animal menu item
- tapOn:
    text: "Animal"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 07-animals

# 8. Open drawer again
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 9. Tap Cages
- tapOn:
    text: "Cages"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 08-cages

# 10. Open drawer
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 11. Tap Mating
- tapOn:
    text: "Mating"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 09-matings

# 12. Open drawer
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 13. Tap Litter
- tapOn:
    text: "Litter"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 10-litters

# 14. Open drawer
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 15. Tap Strain
- tapOn:
    text: "Strain"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 11-strains

# 16. Open drawer
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 17. Scroll drawer down to find Insights (may be off-screen)
- scrollUntilVisible:
    element:
      text: "Insights"
    direction: DOWN
    timeout: 10000

# 17b. Tap Insights (dashboard)
- tapOn:
    text: "Insights"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 12-dashboard

# 18. Open drawer
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000

# 19. Scroll to Settings if needed
- scrollUntilVisible:
    element:
      text: "Settings"
    direction: DOWN
    timeout: 10000

# 19b. Tap Settings
- tapOn:
    text: "Settings"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 13-settings

# 20. Test app bar buttons
- tapOn:
    text: "Tasks"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 14-tasks

- tapOn:
    text: "Calendar"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 15-calendar

- tapOn:
    text: "Cheese AI"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 16-cheese-ai

- takeScreenshot: 17-final
