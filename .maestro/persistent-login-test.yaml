appId: com.moustra.app
---
# Persistent Login Test — Verify session survives app restart
# Target: iPhone 16 Pro Simulator, iOS 18.4
# Credentials: Dev environment
#
# Flow:
#   1. Clear state and log in fresh
#   2. Verify home screen loaded
#   3. Force-close the app (stopApp)
#   4. Relaunch the app (without clearing state/keychain)
#   5. Assert home screen appears WITHOUT re-entering credentials
#
# This validates that:
#   - Refresh token is stored in SecureStore after login
#   - AuthService.init() silently refreshes on next launch
#   - LoginScreen detects existing session and calls _postLogin()
#   - User is not shown the login screen again

# ── Step 1: Fresh start — clear state+keychain so we start logged out ──
- stopApp
- launchApp:
    clearState: true
    clearKeychain: true
- stopApp

# ── Step 1b: Log in via shared flow ──
- runFlow: shared/login.yaml

# ── Step 2: Verify home screen loaded after login ──
- assertVisible: "Open menu"
- takeScreenshot: pl-01-home-after-login

# ── Step 3: Force-close the app ──
- stopApp
- waitForAnimationToEnd:
    timeout: 3000

# ── Step 4: Relaunch WITHOUT clearing state or keychain ──
- launchApp:
    clearState: false
    clearKeychain: false
- waitForAnimationToEnd:
    timeout: 15000

# ── Step 5: Assert persistent login worked ──
# If session persistence works, we should see the home screen (hamburger menu)
# NOT the login screen (no "Email" or "Sign In" fields)
- extendedWaitUntil:
    visible: "Open menu"
    timeout: 45000
- takeScreenshot: pl-02-home-after-restart

# ── Step 6: Verify we can interact (not a stale screen) ──
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: pl-03-drawer-after-restart

# ── Step 7: Verify user identity is preserved ──
# Navigate to Settings to confirm user info is loaded
- tapOn:
    text: "Settings"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: pl-04-settings-after-restart

# ── Cleanup: Stop app (clearState at test start handles reset) ──
- stopApp
