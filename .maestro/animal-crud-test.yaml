appId: com.moustra.app
---
# Animal CRUD — Full Create + Edit + Verify
# Edit: pressKey: Enter triggers onFieldSubmitted → _saveAnimal()

- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Email"
- inputText: "admin+29917@moustra.com"
- tapOn:
    text: "Password"
- inputText: "admin+29917"
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: ".*"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Animal"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: animal-01-list

# CREATE
- tapOn:
    text: "Open actions menu"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Create Animals"
- waitForAnimationToEnd:
    timeout: 5000

# Select cage (coordinate tap)
- tapOn:
    point: "200,345"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "200,220"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "OK"
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    text: "Physical Tag"
- inputText: "QA-ANIMAL-CRUD"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000

- scrollUntilVisible:
    element:
      text: "Create 1 Animal"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Create 1 Animal"
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: animal-02-after-create
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: animal-03-list

# EDIT
- tapOn:
    text: "QA-ANIMAL-CRUD"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: animal-04-edit-form

- tapOn:
    text: "Physical Tag"
- eraseText: 25
- inputText: "QA-ANIMAL-UPDATED"
# Enter triggers _saveAnimal()
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: animal-05-after-edit
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: animal-06-verify
- takeScreenshot: animal-07-final
