appId: com.moustra.app
---
# Verify rack view loads cages correctly

- launchApp
- waitForAnimationToEnd:
    timeout: 10000

# Enter email
- tapOn:
    text: "Email"
- inputText: "test_12085050@moustra.com"
- waitForAnimationToEnd:
    timeout: 1000

# Enter password
- tapOn:
    text: "Password"
- inputText: "test_12085050"
- waitForAnimationToEnd:
    timeout: 1000

# Dismiss keyboard
- tapOn:
    point: "200,200"
- waitForAnimationToEnd:
    timeout: 3000

# Tap Sign In
- tapOn:
    text: "Sign In"
- waitForAnimationToEnd:
    timeout: 3000

# Dismiss iOS password save dialog
- tapOn:
    text: "Not Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Wait for home screen
- extendedWaitUntil:
    visible: "Open menu"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 5000

# Take screenshot of initial view
- takeScreenshot: "01-home-screen"

# Open menu and navigate to rack view
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "02-menu-open"

# Tap on Racks/Colony
- tapOn:
    text: "Colony"
    optional: true
- tapOn:
    text: "Racks"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "03-rack-view"

# Wait for cages to load
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "04-rack-loaded"
