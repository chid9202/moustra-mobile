      text: "User"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "User"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: v2-08-users

# --- Settings ---
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- scrollUntilVisible:
    element:
      text: "Settings"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "Settings"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: v2-09-settings

# ============================================================
