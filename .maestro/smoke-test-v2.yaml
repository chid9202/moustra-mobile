appId: com.moustra.app
---
# Moustra Mobile Smoke Test v2 — Full Navigation
# Uses reusable login flow

# ============================================================
# LOGIN
# ============================================================
- runFlow: shared/login.yaml
- takeScreenshot: v2-01-logged-in

# ============================================================
# NAVIGATE ALL SCREENS
# ============================================================

# --- Cages ---
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Cages"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: v2-02-cages

# --- Animals ---
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Animal"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: v2-03-animals

# --- Matings ---
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Mating"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: v2-04-matings

# --- Litters ---
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Litter"
- waitForAnimationToEnd:
    timeout: 8000
