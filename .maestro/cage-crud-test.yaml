appId: com.moustra.app
---
# Cage CRUD — Full Create + Edit + Verify
# pressKey: Enter on tag field triggers onFieldSubmitted → _saveCage()

# ========== LOGIN ==========
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Email"
- inputText: "admin+29917@moustra.com"
- tapOn:
    text: "Password"
- inputText: "admin+29917"
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: ".*"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 10000

# ========== NAVIGATE ==========
- tapOn:
    text: "Open menu"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Cages"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: cage-01-list

# ========== CREATE ==========
- tapOn:
    text: "Open actions menu"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Create Cage"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Cage Tag"
- inputText: "QA-CAGE-CRUD"
# Enter dismisses keyboard on create form (no onFieldSubmitted on create)
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Save Cage"
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: cage-02-after-create
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: cage-03-list-after-create

# ========== EDIT ==========
- tapOn:
    text: "QA-CAGE-CRUD"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: cage-04-edit-form

- tapOn:
    text: "Cage Tag"
- eraseText: 20
- inputText: "QA-CAGE-UPDATED"
# Enter triggers onFieldSubmitted → _saveCage() → navigates back to list
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: cage-05-after-edit

# ========== VERIFY EDIT ==========
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: cage-06-verify-list

- tapOn:
    text: "QA-CAGE-UPDATED"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: cage-07-verify-edit
- takeScreenshot: cage-08-final
