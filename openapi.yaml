openapi: 3.0.3
info:
  title: Moustra API
  version: 1.0.0
  description: API documentation for Moustra SaaS product
paths:
  /api/v1/account-invite/{invite}:
    post:
      operationId: account_invite_post
      description: Activate lab user invite
      summary: Activate lab user invite
      parameters:
      - in: path
        name: invite
        schema:
          type: string
          format: uuid
        description: Invite UUID
        required: true
      tags:
      - Account Invite
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
  /api/v1/account/{account_uuid}:
