  /api/v1/account/{account_uuid}/animal:
    get:
      operationId: v1_account_animal_list
      description: |-
        Mixin providing shared filter/sort logic for list and export views.

        Subclasses should define:
            valid_sort_fields:   dict  – {key: django_orm_field}
            valid_filter_fields: dict  – {key: django_orm_field_or_dict}

        Optionally override:
            prepare_default_filter()  – set self.default_filters before filtering
      summary: List animals
      parameters:
      - in: path
        name: account_uuid
        schema:
          type: string
          format: uuid
        description: Account UUID
        required: true
      - in: query
        name: filter
        schema:
          type: string
        description: Filter field (repeatable)
      - in: query
        name: op
        schema:
          type: string
        description: Filter operator (repeatable)
      - in: query
        name: order
        schema:
          type: string
        description: asc | desc (repeatable)
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size
      - in: query
        name: sort
        schema:
          type: string
        description: Sortable field (repeatable)
      - in: query
        name: value
        schema:
          type: string
        description: Filter value (repeatable)
      tags:
      - Animal
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
