components:
  schemas:
    AIChatFeedbackSLR:
      type: object
      description: Serializer for submitting feedback on an AI chat response.
      properties:
        feedback:
          type: boolean
          nullable: true
        feedback_detail:
          type: string
          nullable: true
      required:
      - feedback
    AIChatSLR:
      type: object
      description: Serializer for AI chat history.
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        account_name:
          type: string
          readOnly: true
        user_message:
          type: string
        ai_response:
          type: string
        thread_id:
          type: string
          nullable: true
          maxLength: 255
        run_id:
          type: string
          nullable: true
          maxLength: 255
        assistant_id:
          type: string
          nullable: true
          maxLength: 255
        function_calls:
          nullable: true
          description: JSON array of function calls made during this interaction
        feedback:
          type: boolean
          nullable: true
          description: 'User feedback: True=like, False=dislike, None=no feedback'
        feedback_detail:
          type: string
          nullable: true
          description: Optional text detail for feedback
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_name
      - ai_response
      - created_at
      - updated_at
      - user_message
      - uuid
    AccountResetPasswordRequest:
      type: object
      properties:
        new_password:
          type: string
        confirm_new_password:
          type: string
      required:
      - confirm_new_password
      - new_password
    AccountSLR:
      type: object
      properties:
        account_id:
          type: integer
        account_uuid:
          type: string
          format: uuid
        user:
          allOf:
          - $ref: '#/components/schemas/AccountsUser'
          readOnly: true
        role:
          type: string
          maxLength: 100
        is_membership_active:
          type: boolean
          nullable: true
      required:
      - account_id
      - account_uuid
      - user
    AccountWithoutLabSLR:
      type: object
      properties:
        account_id:
          type: integer
        account_uuid:
          type: string
          format: uuid
        user:
          allOf:
          - $ref: '#/components/schemas/AccountsUser'
          readOnly: true
      required:
      - account_id
      - account_uuid
      - user
    AccountsUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - id
      - username
