        name: account_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Account
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PostAccountByAdminSLR'
          multipart/form-data:
            schema:
