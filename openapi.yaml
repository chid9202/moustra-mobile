  /api/v1/account/{account_uuid}/ai/chat/history:
    get:
      operationId: v1_account_ai_chat_history_retrieve
      description: |-
        Get chat history for the authenticated user's account.
        Returns paginated list of chat messages ordered by most recent first.

        Query parameters:
        - page: Page number (default: 1)
        - page_size: Number of results per page (default: 20, max: 100)
