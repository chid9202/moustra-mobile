              $ref: '#/components/schemas/PutAccountByAdminSLR'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PutAccountByAdminSLR'
          application/json:
            schema:
              $ref: '#/components/schemas/PutAccountByAdminSLR'
      security:
      - jwtAuth: []
      responses:
