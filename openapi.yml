components:
  schemas:
    AIChatFeedbackSLR:
      type: object
      description: Serializer for submitting feedback on an AI chat response.
      properties:
        feedback:
          type: boolean
          nullable: true
        feedbackDetail:
          type: string
          nullable: true
      required:
      - feedback
    AIChatSLR:
      type: object
      description: Serializer for AI chat history.
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        accountName:
          type: string
          readOnly: true
        userMessage:
          type: string
        aiResponse:
          type: string
        threadId:
          type: string
          nullable: true
          maxLength: 255
        runId:
          type: string
          nullable: true
          maxLength: 255
        assistantId:
          type: string
          nullable: true
          maxLength: 255
        functionCalls:
          nullable: true
          description: JSON array of function calls made during this interaction
        feedback:
          type: boolean
          nullable: true
          description: 'User feedback: True=like, False=dislike, None=no feedback'
        feedbackDetail:
          type: string
          nullable: true
          description: Optional text detail for feedback
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      required:
      - accountName
      - aiResponse
      - createdAt
      - updatedAt
      - userMessage
      - uuid
    AccountResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
        confirmNewPassword:
          type: string
      required:
      - confirmNewPassword
      - newPassword
    AccountSLR:
      type: object
      properties:
        accountId:
          type: integer
        accountUuid:
          type: string
          format: uuid
        user:
          allOf:
          - $ref: '#/components/schemas/AccountsUser'
          readOnly: true
        role:
          type: string
          maxLength: 100
        isMembershipActive:
          type: boolean
          nullable: true
      required:
      - accountId
      - accountUuid
      - user
    AccountWithoutLabSLR:
      type: object
      properties:
        accountId:
          type: integer
        accountUuid:
          type: string
          format: uuid
        user:
          allOf:
          - $ref: '#/components/schemas/AccountsUser'
          readOnly: true
      required:
      - accountId
      - accountUuid
      - user
    AccountsUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        firstName:
          type: string
          maxLength: 150
        lastName:
          type: string
          maxLength: 150
        isActive:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - id
      - username
    AddAnimalsToLitterSLR:
      type: object
      properties:
        animalUuids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
      - animalUuids
    AddAnimalsToMatingSLR:
      type: object
      properties:
        animalUuids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
      - animalUuids
    AddPubsToLitterSLR:
      type: object
      properties:
        numberOfMale:
          type: integer
          minimum: 0
          default: 0
        numberOfFemale:
          type: integer
          minimum: 0
          default: 0
        numberOfUnknown:
          type: integer
          minimum: 0
          default: 0
    AlleleSLR:
      type: object
      properties:
        alleleId:
          type: integer
          readOnly: true
        alleleUuid:
          type: string
          format: uuid
        createdDate:
          type: string
          format: date-time
          readOnly: true
        alleleName:
          type: string
          maxLength: 100
        isActive:
          type: boolean
        updatedDate:
          type: string
          format: date-time
          readOnly: true
        lab:
          type: string
          format: uuid
          nullable: true
        owner:
          type: string
          format: uuid
          nullable: true
      required:
      - alleleId
      - alleleName
      - createdDate
      - updatedDate
    AnimalAttachmentSLR:
      type: object
      properties:
        attachmentUuid:
          type: string
          format: uuid
          readOnly: true
        fileLink:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        fileName:
          type: string
          nullable: true
          maxLength: 255
        fileSize:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        attachmentType:
          type: string
          nullable: true
        createdDate:
          type: string
          format: date-time
          readOnly: true
        updatedDate:
          type: string
          format: date-time
          readOnly: true
        uploadedBy:
