    post:
      operationId: v1_account_data_migration_analyze_create
      description: |-
        API endpoint for analyzing CSV/Excel files and generating AI-suggested data type mappings.
        Accepts CSV or Excel (.xlsx, .xls) file, creates DataMigration object, and performs synchronous AI analysis.

        The AI analyzes the raw file to detect:
        - Delimiter (comma, semicolon, tab)
        - Header row location (may not be row 0)
        - Rows to skip (metadata, notes, empty rows)
        - Non-standard sex values and their mappings
        - Date format (European DD/MM/YYYY vs US MM/DD/YYYY)
        - Column-to-field mappings
      summary: Analyze data migration file
      parameters:
      - in: path
        name: account_uuid
        schema:
          type: string
          format: uuid
        description: Account UUID
        required: true
      tags:
      - Data Migration
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataMigrationSLR'
          description: ''
        '400':
          description: No response body
