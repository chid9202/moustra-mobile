name: Deploy to App Stores

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release action to run
        required: true
        default: upload_candidate
        type: choice
        options:
          - prepare_release
          - upload_candidate
          - promote_release
      platform:
        description: Target platform
        required: true
        default: both
        type: choice
        options:
          - both
          - ios
          - android
      version_bump:
        description: Version bump type for prepare_release
        required: true
        default: patch
        type: choice
        options:
          - build
          - patch
          - minor
          - major
      version_override:
        description: Explicit marketing version for prepare_release (optional)
        required: false
        type: string
      android_track:
        description: Upload track for Android candidate builds
        required: true
        default: internal
        type: choice
        options:
          - internal
          - beta
          - production
      android_promote_to:
        description: Android promotion target
        required: true
        default: production
        type: choice
        options:
          - beta
          - production
      ios_build:
        description: Existing iOS build number for promote_release (optional)
        required: false
        type: string

jobs:
  deploy:
    name: ${{ inputs.action }}
    runs-on: macos-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-${{ inputs.action }}-${{ inputs.platform }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ruby/setup-ruby@v1
        if: ${{ inputs.action != 'prepare_release' }}
        with:
          ruby-version: "3.2"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          channel: stable
          cache: true

      - name: Create production env file
        run: |
          printf '%s' "${ENV_PRODUCTION}" > .env.production
          cp .env.production .env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}

      - name: Configure git user
        if: ${{ inputs.action == 'prepare_release' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Fastlane dependencies
        if: ${{ inputs.action != 'prepare_release' }}
        run: |
          cd ios && bundle install
          cd ../android && bundle install

      - name: Write App Store Connect key
        if: ${{ inputs.action != 'prepare_release' && (inputs.platform == 'ios' || inputs.platform == 'both') }}
        run: |
          mkdir -p ios/fastlane/keys
          printf '%s' "${APPSTORE_API_PRIVATE_KEY}" > ios/fastlane/keys/AuthKey_HG69G96CXV.p8
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Write Android signing assets
        if: ${{ inputs.action != 'prepare_release' && (inputs.platform == 'android' || inputs.platform == 'both') }}
        run: |
          printf '%s' "${PLAY_STORE_SERVICE_ACCOUNT_JSON}" > android/android-secret.json
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("android/upload-keystore.jks").write_bytes(
              base64.b64decode(os.environ["ANDROID_KEYSTORE_BASE64"])
          )
          PY
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Prepare release
        if: ${{ inputs.action == 'prepare_release' }}
        run: |
          if [[ -n "${VERSION_OVERRIDE}" ]]; then
            ./scripts/deploy.sh prepare --version "${VERSION_OVERRIDE}" --push --tag
          else
            ./scripts/deploy.sh prepare --bump "${VERSION_BUMP}" --push --tag
          fi
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}

      - name: Upload candidate build
        if: ${{ inputs.action == 'upload_candidate' }}
        run: |
          cmd=(./scripts/deploy.sh candidate --platform "${PLATFORM}")
          if [[ "${PLATFORM}" != "ios" ]]; then
            cmd+=(--android-track "${ANDROID_TRACK}")
          fi
          "${cmd[@]}"
        env:
          PLATFORM: ${{ inputs.platform }}
          ANDROID_TRACK: ${{ inputs.android_track }}

      - name: Promote existing build
        if: ${{ inputs.action == 'promote_release' }}
        run: |
          cmd=(./scripts/deploy.sh promote --platform "${PLATFORM}")
          if [[ "${PLATFORM}" != "ios" ]]; then
            cmd+=(--android-to "${ANDROID_PROMOTE_TO}")
          fi
          if [[ -n "${IOS_BUILD}" && "${PLATFORM}" != "android" ]]; then
            cmd+=(--ios-build "${IOS_BUILD}")
          fi
          "${cmd[@]}"
        env:
          PLATFORM: ${{ inputs.platform }}
          ANDROID_PROMOTE_TO: ${{ inputs.android_promote_to }}
          IOS_BUILD: ${{ inputs.ios_build }}
